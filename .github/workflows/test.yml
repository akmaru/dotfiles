on: 
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.generate_docker_image_name.outputs.image_name}}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Initialize .env
      run: ./test/init_env.sh

    - name: Build Docker Image
      run: |
        set -a
        source .env
        set +a
        docker compose -f ./test/docker-compose.yml build

    - name: Push Docker Image
      run: |
        set -a
        source .env
        set +a
        docker compose -f ./test/docker-compose.yml push

  test:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      # Run both OS to completion; a failure on one must not cancel the other
      # (e.g. the git 2.34 conditional-include check is 22.04-specific).
      fail-fast: false
      matrix:
        os: [ubuntu22.04, ubuntu24.04]
    container:
      image: ghcr.io/akmaru/dotfiles:${{ matrix.os }}
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Run install_minimum.sh
        # mise verifies GitHub artifact attestations via the GitHub API when
        # installing aqua-backed tools (uv, gh, ...). Anonymous API access is
        # rate-limited to 60 req/h per IP, which shared runners exhaust (403),
        # failing the install. Authenticate to raise the limit to 5000 req/h.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./install_minimum.sh

      - name: Check the login shell
        run: cat /etc/passwd | grep $(whoami)

      - name: Run zsh
        run: zsh

      # test_mcp_sync.sh runs sync-mcp.sh under an isolated $HOME. The only jq in
      # the image is the mise shim, which re-resolves against $HOME and hangs when
      # $HOME is reassigned. Install a real jq so the MCP test uses a stable binary.
      # The per-component test scripts set up their own PATH (mise/sheldon), so no
      # global mise activation is needed here.
      - name: Install jq (for MCP sync test)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq

      # Run every test step even if an earlier one fails, so one failure does not
      # mask the rest (only skip when the job is cancelled).
      - name: Test MCP sync script
        if: ${{ !cancelled() }}
        run: ./test/test_mcp_sync.sh

      - name: Test sheldon
        if: ${{ !cancelled() }}
        run: ./test/test_sheldon.sh

      - name: Test mise
        if: ${{ !cancelled() }}
        run: ./test/test_mise.sh

      - name: Test aws (session-manager-plugin)
        if: ${{ !cancelled() }}
        run: ./test/test_aws.sh

      - name: Test git config
        if: ${{ !cancelled() }}
        run: ./test/test_git.sh

  